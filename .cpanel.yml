---
deployment:
  tasks:
    - export DEPLOYPATH=/home/dsamecom/health.mobasheri.us
    - /bin/mkdir -p $DEPLOYPATH/data
    - /bin/cp index.php api.php cron.php manifest.json sw.js $DEPLOYPATH/
    - /bin/cp .htaccess $DEPLOYPATH/
    - /bin/cp -R assets icons includes $DEPLOYPATH/
    - /bin/cp data/.htaccess $DEPLOYPATH/data/
    - /bin/mkdir -p $DEPLOYPATH/.well-known
    - /bin/cp .well-known/assetlinks.json $DEPLOYPATH/.well-known/
    - /bin/cp vitatrack.apk $DEPLOYPATH/ || /bin/true
    - /bin/cp thrive.apk $DEPLOYPATH/ || /bin/true
